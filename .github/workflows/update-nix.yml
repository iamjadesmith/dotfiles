name: Update Nix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update flake locks
        run: |
          nix flake update ./nix
          nix flake update ./nix/darwin

      - name: Update mjolnir app pins
        run: nix shell nixpkgs#jq -c ./scripts/update-mjolnir-personal-sources

      - name: Validate flakes
        run: |
          nix flake check ./nix --print-build-logs
          nix flake metadata ./nix/darwin

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add nix/flake.lock nix/darwin/flake.lock nix/hosts/mjolnir/personal-sources.nix
          git diff --cached --quiet || git commit -m "chore: update nix inputs"
          git push
